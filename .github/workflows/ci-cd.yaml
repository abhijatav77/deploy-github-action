name: Docker CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  test-and-build:
    runs-on: self-hosted  # Uses your local runner
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
    
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v2
    
    - name: Run tests in Docker
      run: |
        docker build -t test-image:latest -f Dockerfile.test .
        docker run --rm test-image:latest npm test
    
    - name: Build production image
      run: |
        docker build -t myapp:${{ github.sha }} .
    
    - name: Save image to local registry
      run: |
        # Save to local tar file
        docker save myapp:${{ github.sha }} | gzip > myapp-${{ github.sha }}.tar.gz
    
    - name: Upload artifact
      uses: actions/upload-artifact@v3
      with:
        name: docker-image
        path: myapp-*.tar.gz

  deploy-local:
    needs: test-and-build
    runs-on: self-hosted
    if: github.ref == 'refs/heads/main'
    
    steps:
    - name: Download artifact
      uses: actions/download-artifact@v3
      with:
        name: docker-image
    
    - name: Load and deploy Docker image
      run: |
        # Load the image
        gunzip -c myapp-*.tar.gz | docker load
        
        # Stop old container
        docker stop myapp-container || true
        docker rm myapp-container || true
        
        # Run new container
        docker run -d \
          --name myapp-container \
          -p 3000:3000 \
          --restart unless-stopped \
          myapp:${{ github.sha }}